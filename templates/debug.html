<!DOCTYPE html>
<html>
<head>
    <title>Debug Page</title>
    <style>
        body { font-family: Arial; background: #333; color: #0f0; padding: 20px; }
        h1 { font-size: 32px; }
        .log { background: #000; border: 2px solid #0f0; padding: 20px; margin: 20px 0; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🔧 DEBUG PAGE</h1>
    <div class="log" id="log"></div>
    
    <script>
        const logElement = document.getElementById('log');
        
        function log(msg) {
            const timestamp = new Date().toLocaleTimeString();
            const text = `[${timestamp}] ${msg}`;
            logElement.textContent += text + '\n';
            console.log(text);
        }
        
        log('✅ PAGE LOADED - JavaScript is running!');
        
        log('Fetching /api/status...');
        fetch('/api/status')
            .then(r => {
                log(`✅ Got response: ${r.status}`);
                return r.json();
            })
            .then(data => {
                log(`✅ API Response: ${JSON.stringify(data)}`);
            })
            .catch(err => {
                log(`❌ FETCH ERROR: ${err.message}`);
            });
    </script>
</body>
</html>
